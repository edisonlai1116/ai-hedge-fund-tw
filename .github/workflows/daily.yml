name: Daily Report (每日最該買 · 免 Key)

# 每天自動產生「每日最該買」報告並 commit 進 docs/data/，
# GitHub Pages（main 分支 /docs 資料夾）會自動更新，開網頁即看。
on:
  schedule:
    - cron: "30 22 * * *"   # 22:30 UTC = 隔日 06:30 台北（盤前；含前一日美股收盤資料）
    - cron: "0 9 * * *"     # 09:00 UTC = 17:00 台北（台股收盤後，刷新台股持股）
  workflow_dispatch: {}      # 也可在 Actions 頁面手動觸發

# 讓 workflow 能把報告 commit 回 repo
permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps (免 Key pipeline)
        run: |
          python -m pip install --upgrade pip
          pip install yfinance feedparser requests pandas numpy beautifulsoup4 lxml

      - name: Generate daily report
        run: python -m src.pipeline.daily_report

      - name: Commit updated report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(daily): 每日報告 $(date -u +%Y-%m-%d)"
            git push
          fi
