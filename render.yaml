# Render Blueprint：一個免費的 Docker Web 服務，跑免-Key 全棧（前端 + 查個股/股癌 後端）。
# 用法：在 Render 連到這個 GitHub repo，選 "New +" → "Blueprint"，它會讀這個檔自動建立服務。
services:
  - type: web
    name: ai-hedge-fund-tw
    runtime: docker
    dockerfilePath: ./Dockerfile.web
    plan: free
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHONUTF8
        value: "1"
      # 免費機記憶體/時間有限：掃描減重（標的數、抓取期間、並行數）避免逾時/記憶體不足。
      - key: SP500_SCAN_LIMIT
        value: "40"
      - key: SP500_SCAN_PERIOD
        value: "1y"
      - key: SP500_SCAN_WORKERS
        value: "4"
      # AI 主線長線回測：免費機把回看期間夾到 5 年，避免下載 20 檔×更長期間逾時（回 HTML 錯誤頁）。
      - key: AI_BACKTEST_MAX_PERIOD
        value: "5y"
